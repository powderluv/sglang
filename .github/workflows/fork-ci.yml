name: Fork AMD CI (M5-full)
on:
  workflow_dispatch: {}
jobs:
  amd-gpu-test:
    runs-on: linux-mi35x-gpu-1
    steps:
      - uses: actions/checkout@v4
      - name: Clear VRAM
        run: bash scripts/ci/amd/ensure_vram_clear.sh rocm
      - name: Start ROCm container (mi35x, bypass LOCAL_DOCKER_REGISTRY)
        run: bash scripts/ci/amd/amd_ci_start_container.sh --custom-image lmsysorg/sglang:v0.5.14-rocm700-mi35x
      - name: Assert GPU arch = gfx950
        run: bash scripts/ci/amd/amd_ci_exec.sh rocminfo | grep -q gfx950 && echo "gfx950 confirmed in ci_sglang"
      - name: Install deps
        run: bash scripts/ci/amd/amd_ci_install_dependency.sh
      - name: Run small AMD suite
        run: bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" python3 run_suite.py --hw amd --suite stage-a-test-1-gpu-small-amd
